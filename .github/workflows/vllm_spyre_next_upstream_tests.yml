name: vLLM Spyre Next Upstream Tests

on:
  pull_request:
    paths:
      - 'vllm_spyre_next/**'
      - '.github/workflows/vllm_spyre_next_upstream_tests.yml'
    branches: [main]
  
  push:
    branches: [main]
    paths:
      - 'vllm_spyre_next/**'
      - '.github/workflows/vllm_spyre_next_upstream_tests.yml'
  
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  trigger-jenkins:
    name: "Jenkins: ${{ matrix.test_config.name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      JENKINS_JOB_NAME: "vllm-upstream-test-next"
    strategy:
      fail-fast: false
      matrix:
        test_config:
          - id: "language-generation-facebook"
            name: "Language Generation (facebook models)"
            env_vars:
              UPSTREAM_TESTS_PATHS: "models/language/generation"
              UPSTREAM_PASSING_PATTERNS: "facebook"
              MARKERS: ""
          
          - id: "vision-llava-next"
            name: "Vision (llava_next)"
            env_vars:
              UPSTREAM_TESTS_PATHS: "models/vision"
              UPSTREAM_PASSING_PATTERNS: "llava_next"
              MARKERS: "vision and upstream_passing"
    
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: "Prepare Test Config JSON"
        id: test_config
        run: |
          # Convert env_vars to JSON string
          echo 'json<<EOF' >> $GITHUB_OUTPUT
          echo '${{ toJSON(matrix.test_config.env_vars) }}' >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT
      
      - name: "Trigger Jenkins Job"
        uses: appleboy/jenkins-action@0e0a4e1a7bc6123ed3ec28ba235d77c22f13aa39
        with:
          url: ${{ secrets.JENKINS_URL }}
          user: ${{ secrets.JENKINS_USER }}
          token: ${{ secrets.JENKINS_TOKEN }}
          job: ${{ env.JENKINS_JOB_NAME }}
          parameters: |
            GIT_COMMIT=${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
            TEST_CONFIG_JSON=${{ steps.test_config.outputs.json }}
      
      - name: "Report Status"
        if: always()
        run: |
          echo "### Jenkins Test Status: ${{ matrix.test_config.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Config ID**: ${{ matrix.test_config.id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA**: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Configuration:**" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo '${{ toJSON(matrix.test_config.env_vars) }}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check Jenkins for detailed test results." >> $GITHUB_STEP_SUMMARY

# Made with Bob
