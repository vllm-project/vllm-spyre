name: Build and Publish vllm-spyre-next Library

on:
  release:
    types: [published]

jobs:
  build:
    # Only run for vllm-spyre-next releases (spyre-next-v* tags).
    # v* tags are handled by build_and_publish.yaml.
    if: startsWith(github.ref, 'refs/tags/spyre-next-v')
    runs-on: ubuntu-latest

    environment:
      name: pypi
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
            version: "latest"
            python-version: "3.12"
      - name: Build package
        run: uv build
        working-directory: vllm_spyre_next
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: vllm_spyre_next/dist/
