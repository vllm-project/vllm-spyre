# Upstream test filter configuration for vllm-spyre-next.
#
# Only tests listed here will run from upstream vLLM. All other upstream
# tests are skipped by default (opt-in / whitelist model).
#
# block_list entries take precedence over allow_list entries.
#
# Fields:
#   rel_path          Path relative to upstream vLLM repo root
#   allow_list[].test fnmatch glob matched against test function name
#   allow_list[].mode mandatory_pass (default) | xfail | xfail_strict
#   allow_list[].tags Free-form labels for traceability (no runtime effect)
#   allow_list[].params.skip
#                     Parameter name -> list of values to skip
#   allow_list[].params.override
#                     Parameter name -> replacement values (replaces upstream defaults)
#   block_list[].test fnmatch glob matched against test function name

tests:
  files:
    - rel_path: tests/kernels/core/test_layernorm.py
      allow_list:
        - test: "test_rms_norm"
          mode: mandatory_pass
          tags: [rmsnorm, llama, granite]
          params:
            skip:
              add_residual: [true]
              strided_input: [true]
            override:
              num_tokens: [1, 16]
              hidden_size: [8]
      block_list:
        - test: "test_fused_rms_norm_quant"
